<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Actualités | Wyvern</title>
    <meta name="description" content="Page Actualités">
    <meta name="author" content="Mathis ALLEWEIRELDT">
    <link rel="icon" type="image" href="Assets/images/logowyvern.png">

    <link rel="stylesheet" href="Styles/styles.css">

    <script src="JavaScript/scripts.js" defer></script>

<body>

    <div class="transparent-header">
        <button id="language-btn" class="language-btn">Fr</button>
        <button id="settings-btn" class="settings-btn">
        <i class="fas fa-cog"></i>

    <section class="news">
        <div class="news-grid">

            <article class="news-card">
                <div class="news-date">
                    <i class="far fa-calendar-alt"></i>
                    <span id="news-1-date"></span>
                </div>
                <h3 id="news-1-title" class="news-title"></h3>

            <article class="news-card">

                    <i class="far fa-calendar-alt"></i>

                </div>

                <p id="news-2-content" class="news-content">
                    
                </p>
                <a href="#" class="read-more">Lire l'article &rarr;</a>

            <article class="news-card">
                <div class="news-date">
                    <i class="far fa-calendar-alt"></i>

                </div>
                <h3 id="news-3-title" class="news-title"></h3>
                <p id="news-3-content" class="news-content">
                    
                </p>
                <a href="#" class="read-more">Lire l'article &rarr;</a>
            </article>

        </div>
    </section>

    

    <div id="news-modal" class="modal hidden">
        <div class="modal-content news-modal-content">
            <span class="close-news-btn">&times;</span>
            <h2 id="modal-news-title"></h2>
            <div id="modal-news-body"></div>
        </div>
    </div>

<div id="navbar-container"></div>
<div id="modal-settings"></div>

</html>
